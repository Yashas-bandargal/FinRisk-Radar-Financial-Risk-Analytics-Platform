name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Python files
        run: |
          python -m py_compile api/main.py frontend/app.py ml/feature_engineering.py rag/generator.py rag/retriever.py evaluation/ragas_eval.py
      - name: Run smoke test
        run: |
          echo "CI validation finished successfully"
